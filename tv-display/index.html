<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학원 하원 관리 디스플레이</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: #0a0a1a;
    color: #fff;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* 왼쪽: 디지털 시계 */
  .clock-panel {
    width: 35%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0d1b2a, #1b2838);
    border-right: 2px solid #1e3a5f;
  }
  .clock-date {
    font-size: 2.5vw;
    color: #8ecae6;
    margin-bottom: 1vh;
  }
  .clock-time {
    font-size: 8vw;
    font-weight: 700;
    color: #00f0ff;
    text-shadow: 0 0 20px rgba(0,240,255,0.5);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }
  .clock-seconds {
    font-size: 3vw;
    color: #4cc9f0;
    margin-top: 0.5vh;
  }

  /* 오른쪽: 하원 현황 */
  .status-panel {
    width: 65%;
    display: flex;
    flex-direction: column;
    background: #0f1923;
  }
  .status-header {
    padding: 1.5vh 2vw;
    background: #1a2634;
    border-bottom: 2px solid #1e3a5f;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-header h1 {
    font-size: 2vw;
    color: #8ecae6;
  }
  .status-header .sync-info {
    font-size: 1vw;
    color: #4a6a8a;
  }
  .sync-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .student-list {
    flex: 1;
    overflow-y: auto;
    padding: 1vh 1.5vw;
  }

  .category {
    margin-bottom: 2vh;
  }
  .category-label {
    font-size: 1.3vw;
    padding: 0.5vh 1vw;
    border-radius: 6px;
    margin-bottom: 1vh;
    font-weight: 600;
  }

  .cat-overdue .category-label {
    background: rgba(255, 50, 50, 0.2);
    color: #ff5555;
    border-left: 4px solid #ff5555;
  }
  .cat-now .category-label {
    background: rgba(255, 165, 0, 0.2);
    color: #ffa500;
    border-left: 4px solid #ffa500;
  }
  .cat-3min .category-label {
    background: rgba(255, 255, 0, 0.2);
    color: #ffff00;
    border-left: 4px solid #ffff00;
  }
  .cat-5min .category-label {
    background: rgba(0, 200, 255, 0.2);
    color: #00c8ff;
    border-left: 4px solid #00c8ff;
  }
  .cat-exception .category-label {
    background: rgba(180, 120, 255, 0.2);
    color: #b478ff;
    border-left: 4px solid #b478ff;
  }

  .student-card {
    display: flex;
    align-items: center;
    padding: 1vh 1vw;
    margin-bottom: 0.5vh;
    border-radius: 8px;
    font-size: 1.4vw;
    animation: fadeIn 0.3s ease-in;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .cat-overdue .student-card { background: rgba(255, 50, 50, 0.1); }
  .cat-now .student-card { background: rgba(255, 165, 0, 0.1); }
  .cat-3min .student-card { background: rgba(255, 255, 0, 0.05); }
  .cat-5min .student-card { background: rgba(0, 200, 255, 0.05); }
  .cat-exception .student-card { background: rgba(180, 120, 255, 0.1); }

  .student-name {
    flex: 1;
    font-weight: 600;
  }
  .student-time {
    margin-left: 1vw;
    font-variant-numeric: tabular-nums;
    opacity: 0.8;
  }
  .student-diff {
    margin-left: 1vw;
    font-weight: 700;
    min-width: 6vw;
    text-align: right;
  }
  .student-note {
    margin-left: 1vw;
    font-size: 1.1vw;
    opacity: 0.7;
    font-style: italic;
  }

  .cat-overdue .student-diff { color: #ff5555; }
  .cat-now .student-diff { color: #ffa500; }
  .cat-3min .student-diff { color: #ffff00; }
  .cat-5min .student-diff { color: #00c8ff; }

  .empty-message {
    text-align: center;
    color: #4a6a8a;
    font-size: 1.5vw;
    padding: 5vh;
  }

  /* 설정 모달 */
  .setup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .setup-box {
    background: #1a2634;
    border-radius: 12px;
    padding: 3vh 3vw;
    max-width: 600px;
    width: 90%;
  }
  .setup-box h2 {
    color: #8ecae6;
    margin-bottom: 2vh;
    font-size: 1.8vw;
  }
  .setup-box p {
    color: #aaa;
    font-size: 1vw;
    margin-bottom: 1.5vh;
    line-height: 1.6;
  }
  .setup-box input {
    width: 100%;
    padding: 1vh 1vw;
    font-size: 1.2vw;
    border-radius: 6px;
    border: 1px solid #3a5a7a;
    background: #0f1923;
    color: #fff;
    margin-bottom: 1.5vh;
  }
  .setup-box label {
    color: #8ecae6;
    font-size: 1.1vw;
    display: block;
    margin-bottom: 0.5vh;
  }
  .setup-box button {
    background: #00c8ff;
    color: #000;
    border: none;
    padding: 1vh 2vw;
    font-size: 1.2vw;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
  }
  .setup-box button:hover { background: #00a8dd; }
  .setup-box .hint {
    font-size: 0.9vw;
    color: #666;
    margin-top: 0.5vh;
  }

  /* 스크롤바 숨기기 */
  .student-list::-webkit-scrollbar { width: 6px; }
  .student-list::-webkit-scrollbar-track { background: transparent; }
  .student-list::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 3px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="clock-panel">
  <div class="clock-date" id="clockDate"></div>
  <div class="clock-time" id="clockTime"></div>
  <div class="clock-seconds" id="clockSeconds"></div>
</div>

<div class="status-panel">
  <div class="status-header">
    <h1>🚗 하원 현황</h1>
    <div class="sync-info">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">연결 대기중...</span>
    </div>
  </div>
  <div class="student-list" id="studentList">
    <div class="empty-message">구글 시트를 연결해주세요</div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>📋 구글 시트 연결 설정</h2>
    <p>수강생 대장 구글 시트를 연결합니다.<br>
    아래 안내에 따라 시트 ID와 시트 이름을 입력해주세요.</p>

    <label>구글 시트 ID</label>
    <input type="text" id="sheetId" placeholder="예: 1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms">
    <p class="hint">시트 URL에서 /d/ 와 /edit 사이의 문자열입니다.<br>
    예: https://docs.google.com/spreadsheets/d/<b>여기가_시트ID</b>/edit</p>

    <label>시트(탭) 이름</label>
    <input type="text" id="sheetName" placeholder="예: 수강생대장" value="수강생대장">

    <label>학생 이름 열 (알파벳)</label>
    <input type="text" id="colName" placeholder="예: B" value="B">

    <label>하원 시간 열 (알파벳)</label>
    <input type="text" id="colTime" placeholder="예: E" value="E">

    <label>예외사항/메모 열 (알파벳, 선택)</label>
    <input type="text" id="colNote" placeholder="예: F" value="F">

    <p class="hint">⚠️ 시트를 반드시 <b>"웹에 게시"</b> 해주세요!<br>
    파일 → 공유 → 웹에 게시 → 전체 문서 → CSV → 게시</p>

    <button onclick="saveSetup()">연결 시작</button>
  </div>
</div>

<script>
// ===== 시계 =====
function updateClock() {
  const now = new Date();
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  document.getElementById('clockDate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  document.getElementById('clockTime').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('clockSeconds').textContent =
    String(now.getSeconds()).padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ===== 설정 =====
let config = JSON.parse(localStorage.getItem('hagwon_config') || 'null');

function colToIndex(letter) {
  return letter.toUpperCase().charCodeAt(0) - 65;
}

function saveSetup() {
  const sheetId = document.getElementById('sheetId').value.trim();
  const sheetName = document.getElementById('sheetName').value.trim();
  if (!sheetId) { alert('시트 ID를 입력해주세요'); return; }
  config = {
    sheetId,
    sheetName: sheetName || '수강생대장',
    colName: document.getElementById('colName').value.trim() || 'B',
    colTime: document.getElementById('colTime').value.trim() || 'E',
    colNote: document.getElementById('colNote').value.trim() || 'F',
  };
  localStorage.setItem('hagwon_config', JSON.stringify(config));
  document.getElementById('setupOverlay').style.display = 'none';
  fetchData();
}

if (config) {
  document.getElementById('setupOverlay').style.display = 'none';
  document.getElementById('sheetId').value = config.sheetId;
  document.getElementById('sheetName').value = config.sheetName;
  document.getElementById('colName').value = config.colName;
  document.getElementById('colTime').value = config.colTime;
  document.getElementById('colNote').value = config.colNote;
}

// ===== 구글 시트 데이터 가져오기 =====
async function fetchData() {
  if (!config) return;
  try {
    const url = `https://docs.google.com/spreadsheets/d/${config.sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(config.sheetName)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('시트를 불러올 수 없습니다');
    const text = await res.text();
    const rows = parseCSV(text);
    processStudents(rows);

    document.getElementById('syncDot').style.background = '#00ff88';
    document.getElementById('syncText').textContent =
      `마지막 동기화: ${new Date().toLocaleTimeString('ko-KR')}`;
  } catch (e) {
    console.error(e);
    document.getElementById('syncDot').style.background = '#ff5555';
    document.getElementById('syncText').textContent = '연결 오류 - 재시도 중...';
  }
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let inQuote = false;
    let val = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { val += '"'; i++; }
        else { inQuote = !inQuote; }
      } else if (ch === ',' && !inQuote) {
        cols.push(val.trim());
        val = '';
      } else {
        val += ch;
      }
    }
    cols.push(val.trim());
    rows.push(cols);
  }
  return rows;
}

function parseTime(timeStr) {
  if (!timeStr) return null;
  timeStr = timeStr.replace(/"/g, '').trim();
  // HH:MM, H:MM, 오후 H:MM 등 처리
  let match = timeStr.match(/(\d{1,2}):(\d{2})/);
  if (!match) return null;
  let h = parseInt(match[1]);
  let m = parseInt(match[2]);
  if (timeStr.includes('오후') && h < 12) h += 12;
  if (timeStr.includes('오전') && h === 12) h = 0;
  return h * 60 + m;
}

function processStudents(rows) {
  const nameIdx = colToIndex(config.colName);
  const timeIdx = colToIndex(config.colTime);
  const noteIdx = colToIndex(config.colNote);

  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();

  const categories = {
    overdue: [],  // 하원시간 지남
    now: [],      // 하원시간 (0~1분 이내)
    min3: [],     // 3분 전
    min5: [],     // 5분 전
    exception: [] // 예외사항 있는 학생
  };

  // 첫 행(헤더) 건너뛰기
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const name = (row[nameIdx] || '').replace(/"/g, '').trim();
    const timeStr = row[timeIdx] || '';
    const note = (row[noteIdx] || '').replace(/"/g, '').trim();

    if (!name) continue;
    const leaveMin = parseTime(timeStr);
    if (leaveMin === null) continue;

    const diff = leaveMin - nowMin;
    const student = {
      name,
      time: `${String(Math.floor(leaveMin/60)).padStart(2,'0')}:${String(leaveMin%60).padStart(2,'0')}`,
      diff,
      note
    };

    if (note) {
      categories.exception.push(student);
    } else if (diff < 0) {
      student.diffText = `${Math.abs(diff)}분 지남`;
      categories.overdue.push(student);
    } else if (diff <= 1) {
      student.diffText = '하원시간';
      categories.now.push(student);
    } else if (diff <= 3) {
      student.diffText = `${diff}분 전`;
      categories.min3.push(student);
    } else if (diff <= 5) {
      student.diffText = `${diff}분 전`;
      categories.min5.push(student);
    }
  }

  // 하원시간 지남: 오래 지난 순
  categories.overdue.sort((a, b) => a.diff - b.diff);

  renderStudents(categories);
}

function renderStudents(cats) {
  const container = document.getElementById('studentList');
  let html = '';

  const sections = [
    { key: 'overdue', cls: 'cat-overdue', label: '🔴 하원시간 지남' },
    { key: 'now', cls: 'cat-now', label: '🟠 하원시간' },
    { key: 'min3', cls: 'cat-3min', label: '🟡 3분 전' },
    { key: 'min5', cls: 'cat-5min', label: '🔵 5분 전' },
    { key: 'exception', cls: 'cat-exception', label: '🟣 예외사항' },
  ];

  let hasAny = false;
  for (const sec of sections) {
    const students = cats[sec.key];
    if (!students.length) continue;
    hasAny = true;
    html += `<div class="category ${sec.cls}">`;
    html += `<div class="category-label">${sec.label} (${students.length}명)</div>`;
    for (const s of students) {
      html += `<div class="student-card">`;
      html += `<span class="student-name">${escapeHtml(s.name)}</span>`;
      html += `<span class="student-time">${s.time}</span>`;
      if (s.diffText) {
        html += `<span class="student-diff">${s.diffText}</span>`;
      }
      if (s.note) {
        html += `<span class="student-note">📝 ${escapeHtml(s.note)}</span>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  if (!hasAny) {
    html = '<div class="empty-message">현재 하원 예정 학생이 없습니다 ✨</div>';
  }

  container.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 30초마다 데이터 갱신
setInterval(fetchData, 30000);
// 매 분마다 카테고리 재계산 (시간 변동 반영)
setInterval(() => { if (config) fetchData(); }, 60000);

if (config) fetchData();

// 설정 다시 열기: 화면 더블클릭
document.addEventListener('dblclick', () => {
  document.getElementById('setupOverlay').style.display = 'flex';
});
</script>
</body>
</html>
